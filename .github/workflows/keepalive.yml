name: Keep Supabase alive

# Evita que el proyecto de Supabase (plan gratuito) se pause por inactividad
# tras 7 dias. Hace una peticion ligera a la base de datos cada dia.

on:
  schedule:
    - cron: '0 6 * * *'   # cada dia a las 06:00 UTC
    - cron: '0 6 1 * *'    # ademas, el dia 1 de cada mes (para el commit de actividad)
  workflow_dispatch: {}     # permite lanzarlo a mano desde la pestana Actions

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ping Supabase REST API
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/appointments?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}")
          echo "HTTP status: $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
            echo "::error::Supabase respondio con estado $status"
            exit 1
          fi
          echo "Supabase sigue activo."

      # GitHub desactiva los workflows programados si el repo lleva 60 dias
      # sin ningun commit. Este paso genera un commit minimo una vez al mes
      # para que el cron nunca se desactive solo, sin depender de que alguien
      # se acuerde de programarlo.
      - name: Registrar actividad del repo (evita la desactivacion a los 60 dias)
        run: |
          mkdir -p .github
          echo "Ultimo ping: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/keepalive-last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive-last-run.txt
          if ! git diff --cached --quiet; then
            git commit -m "chore: keepalive activity ping"
            git push
          else
            echo "Sin cambios que commitear."
          fi
